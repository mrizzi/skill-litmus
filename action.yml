name: 'Skill Litmus'
description: 'Run eval suites for Claude Code skills and report results'

inputs:
  evals-dir:
    description: 'Path to evals directory'
    required: false
    default: 'evals/'
  skills-dir:
    description: 'Path to skills directory (auto-detected from plugin.json if omitted)'
    required: false
  baseline-branch:
    description: 'Branch for baseline comparison (defaults to repo default branch)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Install Claude Code
      shell: bash
      run: |
        if ! command -v claude &>/dev/null; then
          curl -fsSL https://claude.ai/install.sh | bash
        fi

    - name: Verify dependencies
      shell: bash
      run: |
        for cmd in jq python3 claude; do
          if ! command -v "$cmd" &>/dev/null; then
            echo "::error::$cmd is required but not found"
            exit 1
          fi
        done

    - name: Save comment body to file
      if: github.event_name == 'issue_comment'
      shell: bash
      env:
        COMMENT_BODY_RAW: ${{ github.event.comment.body }}
      run: |
        printf '%s' "$COMMENT_BODY_RAW" > "$RUNNER_TEMP/comment_body.txt"

    - name: Run evals
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        EVALS_DIR: ${{ inputs.evals-dir }}
        SKILLS_DIR: ${{ inputs.skills-dir }}
        BASELINE_BRANCH: ${{ inputs.baseline-branch }}
        COMMENT_ID: ${{ github.event.comment.id }}
        AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
        PR_URL: ${{ github.event.issue.pull_request.url }}
        PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "${ACTION_PATH}/plugins/skill-litmus/scripts/action-entrypoint.sh"
