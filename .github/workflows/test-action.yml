name: Test Action

on:
  pull_request:
    paths:
      - 'action.yml'
      - 'plugins/skill-litmus/scripts/**'
      - 'plugins/skill-litmus/templates/**'
      - 'tests/**'
      - 'evals.schema.json'
      - '.github/workflows/test-action.yml'
      - '.github/test-fixtures/**'
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'plugins/skill-litmus/scripts/**'
      - 'plugins/skill-litmus/templates/**'
      - 'tests/**'
      - 'evals.schema.json'
      - '.github/workflows/test-action.yml'
      - '.github/test-fixtures/**'

jobs:
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bash syntax of action.yml embedded scripts
        run: |
          python3 -c "
          import yaml, subprocess, sys
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          failed = False
          for i, step in enumerate(data['runs']['steps']):
              if 'run' not in step:
                  continue
              name = step.get('name', f'step-{i}')
              result = subprocess.run(
                  ['bash', '-n'],
                  input=step['run'],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f'::error::Bash syntax error in step {i} ({name})')
                  print(result.stderr)
                  failed = True
              else:
                  print(f'Step {i} ({name}): OK')
          if failed:
              sys.exit(1)
          "

      - name: Validate bash syntax of standalone scripts
        run: |
          status=0
          for script in plugins/skill-litmus/scripts/*.sh; do
            echo -n "$(basename "$script"): "
            if bash -n "$script" 2>&1; then
              echo "OK"
            else
              status=1
            fi
          done
          exit "$status"

      - name: Validate Python syntax
        run: |
          status=0
          for script in plugins/skill-litmus/scripts/*.py; do
            echo -n "$(basename "$script"): "
            if python3 -m py_compile "$script" 2>&1; then
              echo "OK"
            else
              status=1
            fi
          done
          exit "$status"

      - name: Lint workflow files
        uses: rhysd/actionlint@v1.7.12

      - name: ShellCheck standalone scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: plugins/skill-litmus/scripts
          severity: warning

  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  integration:
    name: End-to-End Eval Run
    needs: unit-tests
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if no API key
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "::notice::Skipping — ANTHROPIC_API_KEY not configured"

      - name: Install Claude Code
        if: env.ANTHROPIC_API_KEY != ''
        shell: bash
        run: |
          if ! command -v claude &>/dev/null; then
            curl -fsSL https://claude.ai/install.sh | bash
          fi

      - name: Run eval engine with test fixture
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          bash plugins/skill-litmus/scripts/run-evals.sh \
            --evals .github/test-fixtures/ci-eval/evals.json \
            --skill ci-eval \
            --workspace "$RUNNER_TEMP/ci-eval-workspace" \
            --plugin skill-litmus

      - name: Verify output structure
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          ws="$RUNNER_TEMP/ci-eval-workspace"
          test -f "$ws/benchmark.json"
          test -f "$ws/summary.md"
          test -d "$ws/eval-1"
          test -f "$ws/eval-1/grading.json"
          test -f "$ws/eval-1/timing.json"
          jq -e '.run_summary.total_evals == 1' "$ws/benchmark.json"
          echo "All integration checks passed"
